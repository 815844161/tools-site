<script src="js/common.js"></script>
<script>
function processJSON(callback){
    const input=document.getElementById('jsonInput').value.trim();
    if(!input){setJSONOutput('',true,'warning','请输入JSON字符串');return;}
    try{const parsed=JSON.parse(input);callback(parsed);}
    catch(e){setJSONOutput('',true,'error','❌ JSON语法错误：'+e.message);}
}
function setJSONOutput(text,isError,type,msg){
    const out=document.getElementById('jsonOutput');
    if(isError){out.value=msg;out.style.color='#F53F3F';}else{out.value=text;out.style.color='var(--text)';}
    if(msg){const div=document.createElement('div');div.style.padding='8px 12px';div.style.borderRadius='4px';div.style.marginBottom='8px';
        if(type==='error'){div.style.background='#ffecec';div.style.color='#F53F3F';}else if(type==='success'){div.style.background='#e8f8e8';div.style.color='#00B42A';}else{div.style.background='#fff7e6';div.style.color='#FF7D00';}
        div.textContent=msg;div.id='jsonMsg';
        const old=document.getElementById('jsonMsg');if(old)old.remove();
        document.querySelector('.card').insertBefore(div,document.querySelector('.card').children[1]);
        setTimeout(function(){if(div.parentNode)div.remove();},3000);
    }
}
function formatJSON(){processJSON(function(p){setJSONOutput(JSON.stringify(p,null,4),false);setJSONOutput('',false,'success','✅ JSON格式正确，已格式化');});}
function compressJSON(){processJSON(function(p){setJSONOutput(JSON.stringify(p),false);setJSONOutput('',false,'success','✅ JSON已压缩');});}
function validateJSON(){processJSON(function(p){setJSONOutput(document.getElementById('jsonInput').value,false,'success','✅ JSON格式正确，共 '+(typeof p==='object'?Object.keys(p).length:'N/A')+' 个顶层键');});}
function clearJSON(){document.getElementById('jsonInput').value='';document.getElementById('jsonOutput').value='';}
function copyJSON(){copyText(document.getElementById('jsonOutput').value,'jsonCopyTip');}
