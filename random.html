<script src="js/common.js"></script>
<script>
function genRandom(){
    const min=parseInt(document.getElementById('randMin').value)||0;
    const max=parseInt(document.getElementById('randMax').value)||100;
    const count=parseInt(document.getElementById('randCount').value)||1;
    const unique=document.getElementById('uniqueOnly').checked;
    if(min>=max){alert('最大值必须大于最小值');return;}
    if(unique&&count>max-min+1){alert('不重复模式下，生成个数不能超过范围大小');return;}
    const r=document.getElementById('randResult');r.style.display='block';
    let nums=[];
    if(unique){
        const pool=[];for(let i=min;i<=max;i++)pool.push(i);
        for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
        nums=pool.slice(0,count);
    }else{for(let i=0;i<count;i++)nums.push(min+Math.floor(Math.random()*(max-min+1)));}
    r.innerHTML='<div style="background:#f5f7fa;border-radius:8px;padding:16px;"><div style="font-size:12px;color:#86909c;margin-bottom:8px;">生成结果（共 '+nums.length+' 个）：</div>'
    +'<div style="font-size:24px;font-weight:700;color:#165DFF;word-break:break-all;">'+nums.join(' · ')+'</div>'
    +'<div style="margin-top:12px;"><button class="btn btn-success btn-sm" onclick="copyRand()">📋 复制结果</button><span id="randCopyTip" style="margin-left:8px;font-size:13px;color:#00B42A;display:none;">✅ 已复制</span></div></div>';
    window.randResultText=nums.join(', ');
}
function copyRand(){copyText(window.randResultText,'randCopyTip');}
