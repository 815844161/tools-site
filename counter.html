<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线倒计时工具 - 免费计时器 | 实用工具箱</title>
    <meta name="description" content="免费在线倒计时工具，支持自定义倒计时时长，精确到秒，带声音提醒，适合计时学习、烹饪、运动等场景。">
    <meta name="keywords" content="倒计时,计时器,在线计时,番茄钟,定时器">
    <meta name="robots" content="index, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; text-align: center; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-left: 4px solid #667eea; padding-left: 12px; text-align: left; }
        .timer-display { font-size: 64px; font-weight: 700; color: #333; font-family: 'Courier New', monospace; margin: 20px 0; }
        .timer-display.running { color: #2ed573; }
        .timer-display.warning { color: #ffa502; }
        .timer-display.alert { color: #ff4757; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .controls { margin: 16px 0; }
        .btn { display: inline-block; border: none; padding: 12px 28px; border-radius: 6px; font-size: 16px; cursor: pointer; color: white; margin: 4px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-start { background: #2ed573; }
        .btn-pause { background: #ffa502; }
        .btn-reset { background: #ff4757; }
        .preset-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .preset-btn { background: #f0f2f5; border: 2px solid #e0e0e0; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 14px; color: #555; transition: all 0.2s; }
        .preset-btn:hover { border-color: #667eea; color: #667eea; }
        .custom-input { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
        .custom-input input { width: 60px; padding: 8px; text-align: center; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 16px; }
        .custom-input input:focus { outline: none; border-color: #667eea; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .footer-text { text-align: center; color: #999; font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>⏱ 在线倒计时</h1>
            <p>精确到秒，支持自定义时长</p>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <div class="timer-display" id="timerDisplay">00:00</div>
            <div class="preset-btns">
                <button class="preset-btn" onclick="setTime(60)">1 分钟</button>
                <button class="preset-btn" onclick="setTime(300)">5 分钟</button>
                <button class="preset-btn" onclick="setTime(600)">10 分钟</button>
                <button class="preset-btn" onclick="setTime(1800)">30 分钟</button>
                <button class="preset-btn" onclick="setTime(3600)">1 小时</button>
            </div>
            <div class="custom-input">
                <input type="number" id="customMin" min="0" max="999" value="0" placeholder="分">
                <span style="font-size:18px;line-height:36px;">:</span>
                <input type="number" id="customSec" min="0" max="59" value="0" placeholder="秒">
                <button class="preset-btn" onclick="setCustomTime()">设置</button>
            </div>
            <div class="controls">
                <button class="btn btn-start" id="startBtn" onclick="startTimer()">▶ 开始</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none;">⏸ 暂停</button>
                <button class="btn btn-reset" onclick="resetTimer()">↺ 重置</button>
            </div>
        </div>
        <div class="back-link"><a href="index.html">← 返回工具箱首页</a></div>
        <div class="footer-text">纯在线工具 · 完全免费</div>
    </div>
    <script>
        let totalSeconds = 0;
        let remaining = 0;
        let isRunning = false;
        let interval = null;

        function display() {
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            document.getElementById('timerDisplay').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
            const el = document.getElementById('timerDisplay');
            el.classList.remove('running','warning','alert');
            if (isRunning) {
                if (remaining <= 5) el.classList.add('alert');
                else if (remaining <= 30) el.classList.add('warning');
                else el.classList.add('running');
            }
            if (remaining === 0) { el.classList.remove('running','warning','alert'); }
        }

        function setTime(secs) {
            totalSeconds = secs;
            remaining = secs;
            stopTimer();
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
            display();
        }

        function setCustomTime() {
            const min = parseInt(document.getElementById('customMin').value) || 0;
            const sec = parseInt(document.getElementById('customSec').value) || 0;
            if (min === 0 && sec === 0) return;
            setTime(min * 60 + sec);
        }

        function startTimer() {
            if (remaining <= 0) return;
            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            interval = setInterval(() => {
                remaining--;
                display();
                if (remaining <= 0) { stopTimer(); beep(); }
            }, 1000);
        }

        function pauseTimer() {
            stopTimer();
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = '▶ 继续';
            document.getElementById('pauseBtn').style.display = 'none';
        }

        function stopTimer() {
            if (interval) { clearInterval(interval); interval = null; }
        }

        function resetTimer() {
            stopTimer();
            remaining = totalSeconds;
            isRunning = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = '▶ 开始';
            document.getElementById('pauseBtn').style.display = 'none';
            display();
        }

        function beep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.value = 0.3;
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        display();
    </script>
</body>
</html>
