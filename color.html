<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线颜色转换器 - HEX RGB HSL 颜色转换 | 实用工具箱</title>
    <meta name="description" content="免费在线颜色转换器，支持 HEX、RGB、HSL 三种颜色格式互转，实时预览颜色效果，前端开发必备工具。">
    <meta name="keywords" content="颜色转换器,HEX转RGB,RGB转HEX,HSL,颜色选择器,前端工具">
    <meta name="robots" content="index, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-left: 4px solid #667eea; padding-left: 12px; }
        .color-preview { width: 100%; height: 120px; border-radius: 8px; margin-bottom: 16px; border: 2px solid #eee; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 15px; font-family: 'Courier New', monospace; }
        .input-group input:focus { outline: none; border-color: #667eea; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .footer-text { text-align: center; color: #999; font-size: 13px; padding: 20px 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🎨 颜色转换器</h1>
            <p>HEX / RGB / HSL 格式互转，实时预览</p>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2>🟣 颜色预览</h2>
            <div class="color-preview" id="colorPreview" style="background: #667eea;"></div>
            <div class="input-group"><label>颜色选择器</label><input type="color" id="colorPicker" value="#667eea" oninput="updateFromPicker()"></div>
        </div>
        <div class="card">
            <h2>📐 颜色值</h2>
            <div class="input-group"><label>HEX</label><input type="text" id="hexInput" value="#667eea" oninput="updateFromHex()"></div>
            <div class="input-group"><label>RGB</label><input type="text" id="rgbInput" value="rgb(102,126,234)" oninput="updateFromRgb()"></div>
            <div class="input-group"><label>HSL</label><input type="text" id="hslInput" value="hsl(229,76%,66%)" oninput="updateFromHsl()"></div>
        </div>
        <div class="back-link"><a href="index.html">← 返回工具箱首页</a></div>
        <div class="footer-text">纯在线工具 · 完全免费</div>
    </div>
    <script>
        const preview = document.getElementById('colorPreview');
        const picker = document.getElementById('colorPicker');
        const hexIn = document.getElementById('hexInput');
        const rgbIn = document.getElementById('rgbInput');
        const hslIn = document.getElementById('hslInput');

        function updateFromPicker() { setColor(picker.value); }

        function updateFromHex() {
            let val = hexIn.value.trim();
            if (/^#?[0-9a-fA-F]{6}$/.test(val)) {
                if (!val.startsWith('#')) val = '#' + val;
                setColor(val);
            }
        }

        function updateFromRgb() {
            const m = rgbIn.value.trim().match(/^rgb\s*\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*\)$/);
            if (m) {
                const r = Math.min(255, Math.max(0, parseInt(m[1])));
                const g = Math.min(255, Math.max(0, parseInt(m[2])));
                const b = Math.min(255, Math.max(0, parseInt(m[3])));
                setColor('#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join(''));
            }
        }

        function updateFromHsl() {
            const m = hslIn.value.trim().match(/^hsl\s*\(\s*(\d+)\s*,\s*(\d+)%\s*,\s*(\d+)%\s*\)$/);
            if (m) {
                const h = parseInt(m[1]), s = parseInt(m[2]) / 100, l = parseInt(m[3]) / 100;
                const c = (1 - Math.abs(2*l - 1)) * s;
                const x = c * (1 - Math.abs((h/60) % 2 - 1));
                const m2 = l - c/2;
                let r,g,b;
                if (h < 60) { r=c;g=x;b=0; } else if (h < 120) { r=x;g=c;b=0; } else if (h < 180) { r=0;g=c;b=x; } else if (h < 240) { r=0;g=x;b=c; } else if (h < 300) { r=x;g=0;b=c; } else { r=c;g=0;b=x; }
                setColor('#' + [r,g,b].map(v => Math.round((v+m2)*255).toString(16).padStart(2,'0')).join(''));
            }
        }

        function setColor(hex) {
            preview.style.background = hex;
            picker.value = hex;
            hexIn.value = hex;
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            rgbIn.value = 'rgb(' + r + ',' + g + ',' + b + ')';
            const r2 = r/255, g2 = g/255, b2 = b/255;
            const max = Math.max(r2,g2,b2), min = Math.min(r2,g2,b2);
            let h, s, l = (max + min) / 2;
            if (max === min) { h = 0; s = 0; } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                if (max === r2) h = ((g2 - b2) / d + (g2 < b2 ? 6 : 0)) * 60;
                else if (max === g2) h = ((b2 - r2) / d + 2) * 60;
                else h = ((r2 - g2) / d + 4) * 60;
            }
            hslIn.value = 'hsl(' + Math.round(h) + ',' + Math.round(s*100) + '%,' + Math.round(l*100) + '%)';
        }
    </script>
</body>
</html>
