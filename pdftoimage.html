<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card"><div class="drop-zone" id="pdf2imgDropZone" data-accept=".pdf"><span class="icon">📄</span><div class="text">点击选择或拖拽PDF文件到此处</div><div class="hint">支持 .pdf 格式</div></div>
<div id="pdf2imgInfo" style="display:none;"></div>
<div class="form-row"><div class="form-group"><label>转换模式</label><select id="pdf2imgMode"><option value="all">全部页面</option><option value="range">指定页码范围</option></select></div>
<div class="form-group"><label>页码范围（如 1-3）</label><input type="text" id="pdf2imgRange" placeholder="1-5" value="1-3"></div>
<div class="form-group"><label>输出格式</label><select id="pdf2imgFormat"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option></select></div></div>
<button class="btn btn-primary" onclick="convertPDF2Image()">🔄 开始转换</button>
<div id="pdf2imgResult" style="margin-top:16px;display:none;"></div></div>
<div class="privacy-note">✅ 本工具所有处理均在您的本地浏览器完成，您的文件和数据不会上传到任何服务器。</div>
<div class="ad-placeholder ad-300x250">广告位 300×250</div></div>
<footer><div class="container"><p>本工具所有处理均在您的本地浏览器完成，100%保护您的隐私安全。</p><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
let pdf2imgDoc=null;let pdf2imgFile=null;
setupDropZone('pdf2imgDropZone',function(files){
    const file=files[0];if(!file||file.type!=='application/pdf'){alert('请选择PDF文件');return;}
    pdf2imgFile=file;
    document.getElementById('pdf2imgInfo').style.display='block';
    document.getElementById('pdf2imgInfo').innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:14px;font-size:14px;">⏳ 正在读取PDF...</div>';
    const reader=new FileReader();
    reader.onload=function(e){
        const typedarray=new Uint8Array(e.target.result);
        pdfjsLib.getDocument(typedarray).promise.then(function(doc){
            pdf2imgDoc=doc;
            document.getElementById('pdf2imgInfo').innerHTML='<div style="background:#e8f8e8;border-radius:8px;padding:14px;font-size:14px;">✅ 已加载: '+file.name+' · 共 '+doc.numPages+' 页</div>';
        });
    };reader.readAsArrayBuffer(file);
});
function convertPDF2Image(){
    if(!pdf2imgDoc){alert('请先选择PDF文件');return;}
    const mode=document.getElementById('pdf2imgMode').value;
    let pages=[];const total=pdf2imgDoc.numPages;
    if(mode==='all'){for(let i=1;i<=total;i++)pages.push(i);}
    else{
        const input=document.getElementById('pdf2imgRange').value.trim();
        if(!input){alert('请输入页码范围');return;}
        const m=input.match(/^(\d+)-(\d+)$/);
        if(m)for(let i=parseInt(m[1]);i<=parseInt(m[2]);i++)pages.push(i);
        else if(/^\d+$/.test(input))pages.push(parseInt(input));
    }
    pages=pages.filter(function(p){return p>=1&&p<=total;});
    if(!pages.length){alert('没有有效的页码范围');return;}
    const result=document.getElementById('pdf2imgResult');result.style.display='block';
    result.innerHTML='<div style="text-align:center;padding:20px;color:#86909c;">⏳ 正在转换 '+pages.length+' 页...</div>';
    const fmt=document.getElementById('pdf2imgFormat').value;
    const scale=1.5;
    let count=0;
    pages.forEach(function(pageNum){
        pdf2imgDoc.getPage(pageNum).then(function(page){
            const viewport=page.getViewport({scale:scale});
            const canvas=document.createElement('canvas');
            canvas.width=viewport.width;canvas.height=viewport.height;
            page.render({canvasContext:canvas.getContext('2d'),viewport:viewport}).promise.then(function(){
                const dataUrl=canvas.toDataURL(fmt);
                const a=document.createElement('a');
                a.href=dataUrl;a.download='page_'+pageNum+'.'+(fmt.split('/')[1]);
                a.click();count++;
                if(count===pages.length){
                    result.innerHTML='<div style="background:#e8f8e8;border-radius:8px;padding:16px;text-align:center;">'
                    +'<div style="font-size:16px;font-weight:600;color:#00B42A;margin-bottom:8px;">✅ 转换完成</div>'
                    +'<div style="font-size:13px;color:#4e5969;">已自动下载 '+count+' 张图片</div></div>';
                }
            });
        });
    });
}
</script></body></html>
