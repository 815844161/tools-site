<script src="js/common.js"></script>
<script>
async function calcHash(){
    const text=document.getElementById('hashInput').value;
    const algo=document.getElementById('hashAlgo').value;
    if(!text){alert('请输入要计算的文本');return;}
    const enc=new TextEncoder().encode(text);
    const hashBuf=await crypto.subtle.digest(algo,enc);
    const hashArr=Array.from(new Uint8Array(hashBuf));
    const hashHex=hashArr.map(function(b){return b.toString(16).padStart(2,'0');}).join('');
    const r=document.getElementById('hashResult');r.style.display='block';
    r.innerHTML='<div style="background:#f5f7fa;border-radius:8px;padding:16px;"><div style="font-size:12px;color:#86909c;margin-bottom:4px;">'+algo+' 哈希值</div>'
    +'<div style="font-size:15px;font-weight:600;color:#165DFF;word-break:break-all;font-family:Courier New,monospace;">'+hashHex+'</div>'
    +'<div style="margin-top:8px;"><button class="btn btn-success btn-sm" onclick="copyHash()">📋 复制</button><span id="hashCopyTip" style="margin-left:8px;font-size:13px;color:#00B42A;display:none;">✅ 已复制</span></div></div>';
    window.hashResultText=hashHex;
}
function copyHash(){copyText(window.hashResultText,'hashCopyTip');}
