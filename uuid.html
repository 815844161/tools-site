<div class="form-group"><label>格式</label><select id="uuidFormat"><option value="lower">小写（xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx）</option><option value="upper">大写</option><option value="noDash">小写无连字符</option></select></div></div>

<script src="js/common.js"></script>
<script>
function genUUID(){
    const count=parseInt(document.getElementById('uuidCount').value)||1;
    const fmt=document.getElementById('uuidFormat').value;
    const r=document.getElementById('uuidResult');r.style.display='block';
    let uuids=[];
    for(let i=0;i<count;i++){
        let u='xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){
            const r2=Math.random()*16|0;return(c==='x'?r2:(r2&0x3|0x8)).toString(16);
        });
        if(fmt==='upper')u=u.toUpperCase();
        if(fmt==='noDash')u=u.replace(/-/g,'');
        uuids.push(u);
    }
    r.innerHTML='<div style="background:#f5f7fa;border-radius:8px;padding:16px;">'
    +'<div style="font-size:12px;color:#86909c;margin-bottom:8px;">生成 '+count+' 个UUID：</div>'
    +'<div style="font-size:14px;font-family:Courier New,monospace;word-break:break-all;line-height:2;">'
    +uuids.join('<br>')+'</div>'
    +'<div style="margin-top:12px;"><button class="btn btn-success btn-sm" onclick="copyUUIDs()">📋 复制全部</button></div></div>';
    window.uuidText=uuids.join('\n');
}
function copyUUIDs(){copyText(window.uuidText,'uuidCopyTip');}
</script></body></html>
