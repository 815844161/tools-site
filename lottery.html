<script>
let lotteryHistory=[];let lotteryQueue=[];
function lotteryDraw(){
    const items=document.getElementById('lotteryItems').value.split('\n').filter(function(l){return l.trim();});
    if(!items.length){alert('请至少输入一个选项');return;}

            }).join('');
        }
    },60);
}
