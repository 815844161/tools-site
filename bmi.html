<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card"><div class="form-group"><label>单位制式</label><select id="bmiUnit" onchange="toggleBmiUnit()"><option value="metric">公制（厘米/千克）</option><option value="imperial">英制（英尺/磅）</option></select></div>
<div class="form-row"><div class="form-group" id="heightGroup"><label>身高</label><input type="number" id="bmiHeight" value="170" step="0.1"></div>
<div class="form-group" id="heightFtGroup" style="display:none;"><label>身高（英尺）</label><input type="number" id="bmiHeightFt" value="5" step="0.1"></div>
<div class="form-group" id="heightInGroup" style="display:none;"><label>身高（英寸）</label><input type="number" id="bmiHeightIn" value="8" step="0.1"></div>
<div class="form-group"><label>体重</label><input type="number" id="bmiWeight" value="65" step="0.1"></div>
<div class="form-group" id="weightUnitLabel"><label>单位</label><div style="height:38px;line-height:38px;font-size:13px;color:#86909c;">千克 (kg)</div></div></div>
<button class="btn btn-primary" onclick="calcBMI()">📊 计算BMI</button>

<script src="js/common.js"></script>
<script>
function toggleBmiUnit(){
    const u=document.getElementById('bmiUnit').value;
    document.getElementById('heightGroup').style.display=u==='metric'?'block':'none';
    document.getElementById('heightFtGroup').style.display=u==='imperial'?'block':'none';
    document.getElementById('heightInGroup').style.display=u==='imperial'?'block':'none';
    document.getElementById('weightUnitLabel').style.display=u==='imperial'?'none':'block';
}
function calcBMI(){
    let h,w;
    if(document.getElementById('bmiUnit').value==='metric'){
        h=parseFloat(document.getElementById('bmiHeight').value)/100;
        w=parseFloat(document.getElementById('bmiWeight').value);
    }else{
        const ft=parseFloat(document.getElementById('bmiHeightFt').value)||0;
        const inc=parseFloat(document.getElementById('bmiHeightIn').value)||0;
        h=(ft*12+inc)*0.0254;
        w=parseFloat(document.getElementById('bmiWeight').value)*0.453592;
    }
    if(!h||!w||h<=0||w<=0){alert('请输入有效的身高和体重');return;}
    const bmi=w/(h*h);let status,color;
    if(bmi<18.5){status='偏瘦';color='#FF7D00';}
    else if(bmi<24){status='正常';color='#00B42A';}
    else if(bmi<28){status='偏胖';color='#FF7D00';}
    else if(bmi<35){status='肥胖';color='#F53F3F';}
    else{status='重度肥胖';color='#F53F3F';}
    const r=document.getElementById('bmiResult');r.style.display='block';
    r.innerHTML='<div style="background:#f5f7fa;border-radius:8px;padding:20px;text-align:center;">'
    +'<div style="font-size:12px;color:#86909c;margin-bottom:4px;">你的BMI指数</div>'
    +'<div style="font-size:48px;font-weight:700;color:#165DFF;">'+bmi.toFixed(1)+'</div>'
    +'<div style="font-size:16px;font-weight:600;margin-top:8px;color:'+color+';">'+status+'</div>'
    +'<div style="font-size:12px;color:#86909c;margin-top:8px;">'
    +'偏瘦: &lt;18.5 | 正常: 18.5-24 | 偏胖: 24-28 | 肥胖: 28+</div></div>';
}
</script></body></html>
