<script>
function updateCurrent(){
    const now=Date.now();
    document.getElementById('currentTs').textContent=Math.floor(now/1000);
    document.getElementById('currentTime').textContent=new Date(now).toLocaleString('zh-CN',{hour12:false});
}
updateCurrent();setInterval(updateCurrent,1000);
(function(){const d=new Date();d.setFullYear(2025);document.getElementById('dateToTs').value=d.toISOString().slice(0,16);})();
function tsToDate(){
    let ts=parseInt(document.getElementById('tsToDate').value);
    if(isNaN(ts)){return;}
    if(document.getElementById('tsPrecision').value==='s')ts*=1000;
    const d=new Date(ts);const r=document.getElementById('tsToDateResult');
    r.style.display='block';
    if(isNaN(d.getTime())){r.innerHTML='<div style="background:#ffecec;border-radius:8px;padding:12px;text-align:center;color:#F53F3F;">❌ 无效的时间戳</div>';return;}
    const weekdays=['日','一','二','三','四','五','六'];
    r.innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:16px;text-align:center;">'
    +'<div style="font-size:24px;font-weight:700;color:#165DFF;">'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'</div>'

    +'<div style="font-size:13px;color:#86909c;margin-top:4px;">星期'+weekdays[d.getDay()]+'</div></div>';
}
function dateToTs(){
    const val=document.getElementById('dateToTs').value;if(!val)return;
    const ts=new Date(val).getTime();const s=Math.floor(ts/1000);
    const r=document.getElementById('dateToTsResult');r.style.display='block';
    r.innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:16px;text-align:center;">'
    +'<div style="font-size:12px;color:#86909c;">Unix时间戳（秒）</div>'
    +'<div style="font-size:24px;font-weight:700;color:#165DFF;">'+s+'</div>'
