<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card" style="text-align:center;"><div style="font-size:56px;font-weight:700;font-family:'Courier New',monospace;color:#165DFF;margin:20px 0;" id="stopwatchDisplay">00:00.000</div>
<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
<button class="btn btn-success" id="swStartBtn" onclick="swStart()">▶ 开始</button>
<button class="btn btn-primary" id="swLapBtn" onclick="swLap()" style="display:none;">📍 计次</button>
<button class="btn btn-danger" onclick="swReset()">↺ 重置</button>
</div>
<div id="swLaps" style="margin-top:16px;display:none;"></div></div>
<div class="privacy-note">✅ 本工具所有处理均在您的本地浏览器完成。</div>
<div class="ad-placeholder ad-300x250">广告位 300×250</div></div>
<footer><div class="container"><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
let swStartTime=0,swElapsed=0,swRunning=false,swInterval=null,swLapCount=0;
const swLaps=[];const swDisp=document.getElementById('stopwatchDisplay');
function swUpdate(){
    const now=swRunning?Date.now()-swStartTime+swElapsed:swElapsed;
    const min=Math.floor(now/60000),sec=Math.floor((now%60000)/1000),ms=now%1000;
    swDisp.textContent=String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0')+'.'+String(ms).padStart(3,'0');
}
function swStart(){
    if(swRunning)return;
    swStartTime=Date.now();swRunning=true;
    swInterval=setInterval(swUpdate,10);
    document.getElementById('swStartBtn').textContent='⏸ 暂停';
    document.getElementById('swStartBtn').className='btn btn-primary';
    document.getElementById('swLapBtn').style.display='inline-block';
}
document.getElementById('swStartBtn').onclick=function(){
    if(swRunning){
        clearInterval(swInterval);swRunning=false;
        swElapsed+=Date.now()-swStartTime;
        this.textContent='▶ 继续';this.className='btn btn-success';
    }else{swStart();}
};
function swLap(){
    if(!swRunning)return;
    const now=Date.now()-swStartTime+swElapsed;
    swLapCount++;swLaps.push(now);
    const lapsDiv=document.getElementById('swLaps');lapsDiv.style.display='block';
    const min=Math.floor(now/60000),sec=Math.floor((now%60000)/1000),ms=now%1000;
    lapsDiv.innerHTML='<div style="font-size:13px;color:#86909c;margin-bottom:8px;">计次记录</div>'
    +swLaps.map(function(l,i){
        const m=Math.floor(l/60000),s=Math.floor((l%60000)/1000),ms2=l%1000;
        return '<div style="display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #e5e6eb;">'
        +'<span>📍 第'+(i+1)+'次</span><span style="font-family:Courier New,monospace;">'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms2).padStart(3,'0')+'</span></div>';
    }).join('');
}
function swReset(){
    clearInterval(swInterval);swRunning=false;swElapsed=0;swLapCount=0;swLaps.length=0;
    swDisp.textContent='00:00.000';
    document.getElementById('swStartBtn').textContent='▶ 开始';
    document.getElementById('swStartBtn').className='btn btn-success';
    document.getElementById('swLapBtn').style.display='none';
    document.getElementById('swLaps').style.display='none';
}
</script></body></html>
