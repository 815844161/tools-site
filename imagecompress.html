function compressImage(file){
    const preview=document.getElementById('imgPreview');preview.style.display='block';
    preview.innerHTML='<div style="text-align:center;padding:20px;color:#86909c;">⏳ 正在处理...</div>';
    const reader=new FileReader();
    reader.onload=function(e){
        const img=new Image();
        img.onload=function(){
            const canvas=document.createElement('canvas');
            canvas.width=img.width;canvas.height=img.height;
            const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0);
            const quality=parseInt(document.getElementById('qualitySlider').value)/100;
            const fmt=document.getElementById('outputFormat').value;
            const dataUrl=canvas.toDataURL(fmt,quality);
            const base64=dataUrl.split(',')[1];
            const compressedSize=Math.ceil(base64.length*3/4);
            preview.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'
            +'<div style="text-align:center;"><div style="font-size:12px;color:#86909c;margin-bottom:4px;">压缩前</div>'

            +'<div style="font-size:12px;color:#86909c;">'+img.width+'×'+img.height+'px</div></div>'
            +'<div style="text-align:center;"><div style="font-size:12px;color:#86909c;margin-bottom:4px;">压缩后</div>'
            +'<div style="font-size:20px;font-weight:700;">'+formatSize(compressedSize)+'</div>'
            +'<div style="font-size:12px;color:#86909c;">减少 '+Math.round((1-compressedSize/file.size)*100)+'%</div></div></div>'
            +'<div style="text-align:center;margin-top:16px;"><button class="btn btn-success" onclick="downloadCompressed()">⬇️ 下载压缩后的图片</button></div>';
            window.compressedDataUrl=dataUrl;
            window.compressedFilename=file.name.replace(/\.[^.]+$/,function(m){return '.'+fmt.split('/')[1];});
        };
        img.src=e.target.result;
    };reader.readAsDataURL(file);
}
