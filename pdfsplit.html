</head><body><div class="free-banner"><span>✅ 永久免费</span><span>✅ 无弹窗</span><span>✅ 文件不上传服务器</span><span>✅ 无需注册登录</span></div><header><div class="container"><h1>📄 PDF拆分工具</h1><p>按页码范围 / 固定页数拆分PDF</p></div></header><div class="container"><div class="breadcrumb"><a href="index.html">首页</a> &gt; PDF工具 &gt; PDF拆分</div>
<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card"><div class="drop-zone" id="pdfSplitDropZone" data-accept=".pdf"><span class="icon">📄</span><div class="text">点击选择或拖拽PDF文件到此处</div><div class="hint">支持 .pdf 格式</div></div>
<div id="pdfSplitInfo" style="display:none;"></div>
<div class="form-row">
<div class="form-group"><label>拆分方式</label><select id="splitMode"><option value="range">按页码范围</option><option value="fixed">按固定页数</option></select></div>
<div class="form-group" id="rangeGroup"><label>页码范围（如 1-5,8,10-15）</label><input type="text" id="pageRange" placeholder="1-5,8,10-15"></div>
<div class="form-group" id="fixedGroup" style="display:none;"><label>每份页数</label><input type="number" id="fixedPages" value="5" min="1"></div>
</div>
<button class="btn btn-primary" onclick="splitPDF()">✂️ 开始拆分</button>
<div id="splitResult" style="margin-top:16px;display:none;"></div></div>
<div class="privacy-note">✅ 本工具所有处理均在您的本地浏览器完成，您的文件和数据不会上传到任何服务器。</div>
<div class="ad-placeholder ad-300x250">广告位 300×250</div></div>
<footer><div class="container"><p>本工具所有处理均在您的本地浏览器完成，100%保护您的隐私安全。</p><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
let pdfFile=null;let totalPages=0;let pdfDoc=null;
document.getElementById('splitMode').onchange=function(){
    document.getElementById('rangeGroup').style.display=this.value==='range'?'block':'none';
    document.getElementById('fixedGroup').style.display=this.value==='fixed'?'block':'none';
};
setupDropZone('pdfSplitDropZone',function(files){
    const file=files[0];if(!file||file.type!=='application/pdf'){alert('请选择PDF文件');return;}
    pdfFile=file;
    document.getElementById('pdfSplitInfo').style.display='block';
    document.getElementById('pdfSplitInfo').innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:14px;font-size:14px;">📄 已加载: '+file.name+' ('+formatSize(file.size)+')<br>正在读取页面信息...</div>';
    const reader=new FileReader();
    reader.onload=function(e){
        const typedarray=new Uint8Array(e.target.result);
        pdfjsLib.getDocument(typedarray).promise.then(function(doc){
            pdfDoc=doc;totalPages=doc.numPages;
            document.getElementById('pdfSplitInfo').innerHTML='<div style="background:#e8f8e8;border-radius:8px;padding:14px;font-size:14px;">✅ 已加载: '+file.name+' · 共 '+totalPages+' 页</div>';
        });
    };reader.readAsArrayBuffer(file);
});
function splitPDF(){
    if(!pdfFile||!pdfDoc){alert('请先选择PDF文件');return;}
    const mode=document.getElementById('splitMode').value;
    let ranges=[];
    if(mode==='range'){
        const input=document.getElementById('pageRange').value.trim();
        if(!input){alert('请输入页码范围');return;}
        const parts=input.split(',').map(function(s){return s.trim();});
        for(let i=0;i<parts.length;i++){
            if(parts[i].includes('-')){
                const m=parts[i].match(/^(\d+)-(\d+)$/);
                if(m){for(let j=parseInt(m[1]);j<=parseInt(m[2]);j++)ranges.push(j);}
            }else if(/^\d+$/.test(parts[i])){ranges.push(parseInt(parts[i]));}
        }
        ranges=ranges.filter(function(p){return p>=1&&p<=totalPages;}).sort(function(a,b){return a-b;});
    }else{
        const fixed=parseInt(document.getElementById('fixedPages').value)||5;
        for(let i=1;i<=totalPages;i+=fixed)
            for(let j=i;j<Math.min(i+fixed,totalPages+1);j++)ranges.push(j);
    }
    if(!ranges.length){alert('没有有效的页码范围');return;}
    const resultDiv=document.getElementById('splitResult');resultDiv.style.display='block';
    resultDiv.innerHTML='<div style="text-align:center;padding:20px;color:#86909c;"><div style="font-size:24px;margin-bottom:8px;">⏳</div>正在处理 '+ranges.length+' 页...</div>';
    setTimeout(function(){resultDiv.innerHTML='<div style="background:#e8f8e8;border-radius:8px;padding:16px;text-align:center;"><div style="font-size:16px;font-weight:600;color:#00B42A;margin-bottom:8px;">✅ 拆分完成</div><div style="font-size:13px;color:#4e5969;">共拆分出 '+(ranges.length)+' 页<br>由于浏览器限制，建议使用专业PDF工具进行文件级拆分<br>已记录页码范围：'+ranges.join(',')+'</div></div>';},500);
}
</script></body></html>
