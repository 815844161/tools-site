<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card"><div class="drop-zone" id="imgResizeDropZone" data-accept="image/*"><span class="icon">🖼️</span><div class="text">点击选择或拖拽图片到此处</div><div class="hint">支持 JPG / PNG / WebP</div></div></div>
<div class="card" id="resizeControls" style="display:none;">
<div class="form-row"><div class="form-group"><label>缩放方式</label><select id="resizeMode" onchange="toggleResizeMode()"><option value="percent">按百分比</option><option value="fixed">自定义尺寸</option></select></div>
<div class="form-group" id="percentGroup"><label>缩放比例（%）</label><input type="number" id="percentVal" value="50" min="1" max="500"></div>
<div class="form-group" id="fixedGroup" style="display:none;"><label>宽度（px）</label><input type="number" id="fixedWidth" placeholder="自动"></div>
<div class="form-group" id="fixedGroup2" style="display:none;"><label>高度（px）</label><input type="number" id="fixedHeight" placeholder="自动"></div></div>
<div class="form-group"><label><input type="checkbox" id="lockRatio" checked> 锁定宽高比</label></div>
<div class="form-group"><label>输出格式</label><select id="resizeFormat"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option><option value="image/webp">WebP</option></select></div>
<button class="btn btn-primary" onclick="resizeImage()">📐 开始缩放</button>
<div id="resizeResult" style="margin-top:16px;display:none;"></div></div>
<div class="privacy-note">✅ 本工具所有处理均在您的本地浏览器完成，您的文件和数据不会上传到任何服务器。</div>
<div class="ad-placeholder ad-300x250">广告位 300×250</div></div>
<footer><div class="container"><p>本工具所有处理均在您的本地浏览器完成，100%保护您的隐私安全。</p><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
let imgResizeData=null;
function toggleResizeMode(){
    const mode=document.getElementById('resizeMode').value;
    document.getElementById('percentGroup').style.display=mode==='percent'?'block':'none';
    document.getElementById('fixedGroup').style.display=mode==='fixed'?'block':'none';
    document.getElementById('fixedGroup2').style.display=mode==='fixed'?'block':'none';
}
setupDropZone('imgResizeDropZone',function(files){
    const file=files[0];if(!file||!file.type.startsWith('image/')){alert('请选择图片文件');return;}
    const reader=new FileReader();
    reader.onload=function(e){
        const img=new Image();
        img.onload=function(){
            imgResizeData={img:img,name:file.name,width:img.width,height:img.height};
            document.getElementById('resizeControls').style.display='block';
            document.getElementById('fixedWidth').value=img.width;
            document.getElementById('fixedHeight').value=img.height;
            document.getElementById('resizeResult').innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:14px;font-size:14px;text-align:center;">✅ 已加载: '+file.name+'<br>原图尺寸: '+img.width+'×'+img.height+'px</div>';
            document.getElementById('resizeResult').style.display='block';
        };img.src=e.target.result;
    };reader.readAsDataURL(file);
});
function resizeImage(){
    if(!imgResizeData){alert('请先选择图片');return;}
    const img=imgResizeData.img;
    let w,h;
    if(document.getElementById('resizeMode').value==='percent'){
        const p=parseInt(document.getElementById('percentVal').value)||100;
        w=Math.round(img.width*p/100);h=Math.round(img.height*p/100);
    }else{
        const fw=parseInt(document.getElementById('fixedWidth').value);
        const fh=parseInt(document.getElementById('fixedHeight').value);
        const lock=document.getElementById('lockRatio').checked;
        if(lock){
            if(fw&&!fh){w=fw;h=Math.round(fw/img.width*img.height);}
            else if(!fw&&fh){h=fh;w=Math.round(fh/img.height*img.width);}
            else{w=fw||img.width;h=Math.round(w/img.width*img.height);}
        }else{w=fw||img.width;h=fh||img.height;}
    }
    const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
    const ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,w,h);
    const fmt=document.getElementById('resizeFormat').value;
    const dataUrl=canvas.toDataURL(fmt,0.92);
    const result=document.getElementById('resizeResult');
    result.innerHTML='<div style="background:#e8f8e8;border-radius:8px;padding:16px;text-align:center;">'
    +'<div style="font-size:16px;font-weight:600;color:#00B42A;margin-bottom:8px;">✅ 缩放完成</div>'
    +'<div style="font-size:14px;color:#4e5969;">缩放后尺寸: '+w+'×'+h+'px</div>'
    +'<div style="margin-top:12px;"><button class="btn btn-success" onclick="downloadResized()">⬇️ 下载图片</button></div></div>';
    window.resizedDataUrl=dataUrl;
    const ext=fmt.split('/')[1];
    window.resizedFilename=imgResizeData.name.replace(/\.[^.]+$/,'_resized.'+ext);
}
function downloadResized(){if(window.resizedDataUrl)downloadFile(window.resizedDataUrl,window.resizedFilename);}
</script></body></html>
