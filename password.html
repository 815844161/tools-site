<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线随机密码生成器 - 强密码生成工具 | 实用工具箱</title>
    <meta name="description" content="免费在线随机密码生成器，支持自定义长度、包含大小写字母、数字、特殊符号，一键生成高强度密码，保障账户安全。">
    <meta name="keywords" content="密码生成器,随机密码,强密码,密码工具,在线密码">
    <meta name="robots" content="index, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 16px; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-left: 4px solid #667eea; padding-left: 12px; }
        .password-box { background: #f8f9ff; border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .password-display { font-size: 24px; font-weight: 700; color: #333; word-break: break-all; font-family: 'Courier New', monospace; letter-spacing: 2px; }
        .controls { margin-top: 20px; }
        .control-group { display: flex; align-items: center; margin-bottom: 12px; }
        .control-group label { flex: 0 0 160px; font-size: 14px; color: #666; }
        .control-group input[type="range"] { flex: 1; margin: 0 10px; }
        .control-group .value { font-size: 14px; font-weight: 600; color: #667eea; min-width: 30px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .checkbox-group label { font-size: 14px; color: #555; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn { border: none; padding: 10px 24px; border-radius: 6px; font-size: 15px; cursor: pointer; color: white; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #667eea; }
        .btn-success { background: #2ed573; }
        .btn-danger { background: #ff4757; }
        .strength-bar { height: 6px; border-radius: 3px; margin-top: 12px; transition: all 0.3s; }
        .strength-text { font-size: 14px; font-weight: 600; margin-top: 8px; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        @media (max-width: 600px) { header h1 { font-size: 22px; } .password-display { font-size: 18px; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🔑 随机密码生成器</h1>
            <p>一键生成高强度随机密码，保护账户安全</p>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2>🔐 生成的密码</h2>
            <div class="password-box">
                <div class="password-display" id="passwordDisplay">P@ssW0rd!23</div>
                <div class="strength-bar" id="strengthBar" style="background: #2ed573;"></div>
                <div class="strength-text" id="strengthText">强度：强</div>
            </div>
            <div style="text-align:center;">
                <button class="btn btn-primary" onclick="generatePassword()">🔄 重新生成</button>
                <button class="btn btn-success" onclick="copyPassword()">📋 复制密码</button>
                <span id="copyTip2" style="margin-left:10px;font-size:13px;color:#2ed573;display:none;">✅ 已复制</span>
            </div>
        </div>
        <div class="card">
            <h2>⚙️ 设置</h2>
            <div class="control-group">
                <label>密码长度：<span id="lenValue" class="value">12</span></label>
                <input type="range" id="lengthSlider" min="4" max="64" value="12" oninput="updateLen(); generatePassword();">
            </div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="chkUpper" checked> 大写字母 (A-Z)</label>
                <label><input type="checkbox" id="chkLower" checked> 小写字母 (a-z)</label>
                <label><input type="checkbox" id="chkDigit" checked> 数字 (0-9)</label>
                <label><input type="checkbox" id="chkSymbol" checked> 特殊符号 (!@#$)</label>
            </div>
        </div>
        <div class="back-link"><a href="index.html">← 返回工具箱首页</a></div>
        <div class="footer-text" style="text-align:center;color:#999;font-size:13px;padding:20px 0;">纯在线工具 · 不存储任何内容 · 完全免费</div>
    </div>
    <script>
        function updateLen() { document.getElementById('lenValue').textContent = document.getElementById('lengthSlider').value; }
        function generatePassword() {
            const len = parseInt(document.getElementById('lengthSlider').value);
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; const lower = 'abcdefghijklmnopqrstuvwxyz';
            const digit = '0123456789'; const symbol = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            let chars = '', required = [];
            if (document.getElementById('chkUpper').checked) { chars += upper; required.push(upper[Math.floor(Math.random() * upper.length)]); }
            if (document.getElementById('chkLower').checked) { chars += lower; required.push(lower[Math.floor(Math.random() * lower.length)]); }
            if (document.getElementById('chkDigit').checked) { chars += digit; required.push(digit[Math.floor(Math.random() * digit.length)]); }
            if (document.getElementById('chkSymbol').checked) { chars += symbol; required.push(symbol[Math.floor(Math.random() * symbol.length)]); }
            if (!chars) { document.getElementById('passwordDisplay').textContent = '请至少选择一种字符类型'; return; }
            let password = required.join('');
            for (let i = password.length; i < len; i++) { password += chars[Math.floor(Math.random() * chars.length)]; }
            password = password.split('').sort(() => Math.random() - 0.5).join('');
            document.getElementById('passwordDisplay').textContent = password;
            updateStrength(password);
        }
        function updateStrength(pwd) {
            let score = 0;
            if (pwd.length >= 8) score++; if (pwd.length >= 12) score++; if (pwd.length >= 16) score++;
            if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
            if (/\d/.test(pwd)) score++;
            if (/[^a-zA-Z0-9]/.test(pwd)) score++;
            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');
            if (score <= 2) { bar.style.background = '#ff4757'; text.textContent = '强度：弱 ❌'; text.style.color = '#ff4757'; }
            else if (score <= 4) { bar.style.background = '#ffa502'; text.textContent = '强度：中 ⚠️'; text.style.color = '#ffa502'; }
            else { bar.style.background = '#2ed573'; text.textContent = '强度：强 ✅'; text.style.color = '#2ed573'; }
        }
        function copyPassword() {
            const pwd = document.getElementById('passwordDisplay').textContent;
            navigator.clipboard.writeText(pwd).then(() => {
                const tip = document.getElementById('copyTip2');
                tip.style.display = 'inline'; setTimeout(() => { tip.style.display = 'none'; }, 2000);
            });
        }
        generatePassword();
    </script>
</body>
</html>
