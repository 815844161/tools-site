<div class="ad-placeholder ad-728x90">广告位 728×90</div><div class="ad-placeholder ad-320x100">广告位 320×100</div>
<div class="card"><h2 style="font-size:16px;margin-bottom:12px;">📊 计算两个日期相差</h2>
<div class="form-row"><div class="form-group"><label>开始日期</label><input type="date" id="date1"></div>
<div class="form-group"><label>结束日期</label><input type="date" id="date2"></div></div>
<button class="btn btn-primary" onclick="calcDateDiff()">📊 计算日期差</button>
<div id="dateDiffResult" style="margin-top:12px;display:none;"></div></div>
<div class="card"><h2 style="font-size:16px;margin-bottom:12px;">➕ 计算N天后的日期</h2>
<div class="form-row"><div class="form-group"><label>起始日期</label><input type="date" id="startDate"></div>
<div class="form-group"><label>间隔</label><input type="number" id="addDays" value="30" min="-9999" max="9999"></div>
<div class="form-group"><label>单位</label><select id="addUnit"><option value="day">天</option><option value="week">周</option><option value="month">月</option><option value="year">年</option></select></div></div>
<button class="btn btn-primary" onclick="calcAddDate()">📅 计算日期</button>
<div id="addDateResult" style="margin-top:12px;display:none;"></div></div>
<div class="privacy-note">✅ 本工具所有处理均在您的本地浏览器完成，您的文件和数据不会上传到任何服务器。</div>
<div class="ad-placeholder ad-300x250">广告位 300×250</div></div>
<footer><div class="container"><p>本工具所有处理均在您的本地浏览器完成，100%保护您的隐私安全。</p><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
(function(){const t=new Date();document.getElementById('date1').value=t.toISOString().split('T')[0];
const t2=new Date(t);t2.setDate(t2.getDate()+30);document.getElementById('date2').value=t2.toISOString().split('T')[0];
document.getElementById('startDate').value=t.toISOString().split('T')[0];})();
function calcDateDiff(){
    const d1=new Date(document.getElementById('date1').value);
    const d2=new Date(document.getElementById('date2').value);
    if(isNaN(d1)||isNaN(d2)){alert('请选择有效的日期');return;}
    const diff=Math.abs(d2-d1);
    const days=Math.floor(diff/(1000*60*60*24));
    const weeks=Math.floor(days/7);
    const months=(d2.getFullYear()-d1.getFullYear())*12+(d2.getMonth()-d1.getMonth());
    const years=Math.floor(months/12);
    const r=document.getElementById('dateDiffResult');r.style.display='block';
    r.innerHTML='<div style="background:#f5f7fa;border-radius:8px;padding:16px;"><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;text-align:center;">'
    +'<div><div style="font-size:12px;color:#86909c;">相差天数</div><div style="font-size:24px;font-weight:700;color:#165DFF;">'+days+'</div></div>'
    +'<div><div style="font-size:12px;color:#86909c;">相差周数</div><div style="font-size:24px;font-weight:700;color:#165DFF;">'+weeks+'</div></div>'
    +'<div><div style="font-size:12px;color:#86909c;">相差月数</div><div style="font-size:24px;font-weight:700;color:#165DFF;">'+Math.abs(months)+'</div></div>'
    +'<div><div style="font-size:12px;color:#86909c;">相差年数</div><div style="font-size:24px;font-weight:700;color:#165DFF;">'+Math.abs(years)+'</div></div></div></div>';
}
function calcAddDate(){
    const d=new Date(document.getElementById('startDate').value);
    const n=parseInt(document.getElementById('addDays').value)||0;
    const unit=document.getElementById('addUnit').value;
    if(isNaN(d)){alert('请选择有效的日期');return;}
    switch(unit){
        case 'day':d.setDate(d.getDate()+n);break;
        case 'week':d.setDate(d.getDate()+n*7);break;
        case 'month':d.setMonth(d.getMonth()+n);break;
        case 'year':d.setFullYear(d.getFullYear()+n);break;
    }
    const r=document.getElementById('addDateResult');r.style.display='block';
    const weekdays=['日','一','二','三','四','五','六'];
    r.innerHTML='<div style="background:#e8f0ff;border-radius:8px;padding:16px;text-align:center;">'
    +'<div style="font-size:12px;color:#86909c;margin-bottom:4px;">计算结果</div>'
    +'<div style="font-size:24px;font-weight:700;color:#165DFF;">'+d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+'</div>'
    +'<div style="font-size:14px;color:#4e5969;margin-top:4px;">星期'+weekdays[d.getDay()]+'</div></div>';
}
</script></body></html>
