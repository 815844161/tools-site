function calcMortgage() {

        const factor = Math.pow(1 + rate, n);
        const monthly = total * rate * factor / (factor - 1);
        let remaining = total;
        for (let i = 0; i < paid; i++) {
            const interest = remaining * rate;
            remaining -= (monthly - interest);
        }
        const oldRemaining = remaining;

            const newTotalInt = monthly * newN - newRemaining;
            showResult(oldTotalInt, newTotalInt, Math.round(newN), oldMonthly, null);
        } else {
            const newMonthly = newRemaining * rate * Math.pow(1 + rate, n - paid) / (Math.pow(1 + rate, n - paid) - 1);

    } else {
        const monthPrincipal = total / n;
        let remaining = total;
        let totalInt = 0;
        for (let i = 0; i < paid; i++) {
            totalInt += remaining * rate;
            remaining -= monthPrincipal;

        const newRemaining = Math.max(0, remaining - prepay);
