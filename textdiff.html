<div><div style="font-size:12px;color:#86909c;margin-bottom:4px;">🔵 原文本</div>
<textarea id="diffOld" style="width:100%;min-height:150px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;resize:vertical;font-family:'Courier New',monospace;line-height:1.6;" placeholder="输入原文本..."></textarea></div>

<textarea id="diffNew" style="width:100%;min-height:150px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;resize:vertical;font-family:'Courier New',monospace;line-height:1.6;" placeholder="输入新文本..."></textarea></div></div>
<button class="btn btn-primary" onclick="diffText()" style="margin-top:12px;">📊 对比差异</button>

<script src="js/common.js"></script>
<script>
function diffText(){
    const oldLines=document.getElementById('diffOld').value.split('\n');
    const newLines=document.getElementById('diffNew').value.split('\n');
    const result=document.getElementById('diffResult');result.style.display='block';
    let html='<div style="background:#f5f7fa;border-radius:8px;padding:12px;font-family:Courier New,monospace;font-size:13px;line-height:2;max-height:400px;overflow-y:auto;">';
    // 简单逐行对比（有差异标色，相同的显示灰色）
    const maxLen=Math.max(oldLines.length,newLines.length);
    let added=0,removed=0,unChanged=0;
    for(let i=0;i<maxLen;i++){
        const oldLine=oldLines[i]||'',newLine=newLines[i]||'';
        if(oldLine===newLine){
            html+='<div style="color:#86909c;">  '+escapeHtml(oldLine||' ')+'</div>';unChanged++;
        }else{
            if(oldLine)html+='<div style="color:#F53F3F;background:#ffecec;">- '+escapeHtml(oldLine)+'</div>';
            if(newLine)html+='<div style="color:#00B42A;background:#e8f8e8;">+ '+escapeHtml(newLine)+'</div>';
            if(oldLine&&newLine){removed++;added++;}
            else if(oldLine)removed++;
            else if(newLine)added++;
        }
    }
    html+='</div>';
    html+='<div style="display:flex;gap:16px;margin-top:8px;font-size:13px;">'
    +'<span>📊 总计 '+maxLen+' 行</span>'
    +'<span style="color:#00B42A;">+'+added+' 增加</span>'
    +'<span style="color:#F53F3F;">-'+removed+' 删除</span>'
    +'<span style="color:#86909c;">='+unChanged+' 相同</span></div>';
    result.innerHTML=html;
}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script></body></html>
