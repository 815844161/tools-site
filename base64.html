<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线 Base64 编解码工具 - 免费加密解密 | 实用工具箱</title>
    <meta name="description" content="免费在线 Base64 编码解码工具，支持文字和文件的 Base64 编码与解码，实时转换，纯前端处理，数据不上传服务器。">
    <meta name="keywords" content="Base64,Base64编码,Base64解码,在线编解码,加密解密">
    <meta name="robots" content="index, follow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 40px 0; text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { opacity: 0.9; }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-left: 4px solid #667eea; padding-left: 12px; }
        textarea { width: 100%; min-height: 120px; padding: 12px; font-size: 14px; border: 2px solid #e0e0e0; border-radius: 8px; resize: vertical; font-family: 'Courier New', monospace; }
        textarea:focus { outline: none; border-color: #667eea; }
        .label-text { font-size: 13px; color: #888; margin: 12px 0 4px; }
        .btn-row { text-align: center; margin: 16px 0; }
        .btn { display: inline-block; border: none; padding: 10px 24px; border-radius: 6px; font-size: 15px; cursor: pointer; color: white; margin: 4px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.85; }
        .btn-encode { background: #667eea; }
        .btn-decode { background: #2ed573; }
        .btn-clear2 { background: #ff4757; }
        .btn-copy2 { background: #ffa502; }
        .swap-btn { background: #764ba2; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #667eea; text-decoration: none; }
        .footer-text { text-align: center; color: #999; font-size: 13px; padding: 20px 0; }
        .result-box { background: #f8f9ff; border-radius: 8px; padding: 12px; min-height: 60px; word-break: break-all; font-family: 'Courier New', monospace; font-size: 13px; border: 2px solid #e0e0e0; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🔐 Base64 编解码</h1>
            <p>纯前端处理，数据不上传服务器，安全可靠</p>
        </div>
    </header>
    <div class="container">
        <div class="card">
            <h2>📥 输入</h2>
            <textarea id="inputText" placeholder="输入要编码或解码的文字..."></textarea>
            <div class="btn-row">
                <button class="btn btn-encode" onclick="encode()">⬇️ 编码 (Encode)</button>
                <button class="btn btn-decode" onclick="decode()">⬆️ 解码 (Decode)</button>
                <button class="btn swap-btn" onclick="swapInputOutput()">🔄 交换</button>
                <button class="btn btn-clear2" onclick="clearAll()">🗑️ 清空</button>
            </div>
        </div>
        <div class="card">
            <h2>📤 输出</h2>
            <div class="result-box" id="outputText"></div>
            <div class="btn-row">
                <button class="btn btn-copy2" onclick="copyOutput()">📋 复制结果</button>
                <span id="copyTip3" style="margin-left:10px;font-size:13px;color:#2ed573;display:none;">✅ 已复制</span>
            </div>
        </div>
        <div class="back-link"><a href="index.html">← 返回工具箱首页</a></div>
        <div class="footer-text">纯在线工具 · 数据不上传 · 完全免费</div>
    </div>
    <script>
        function encode() {
            const input = document.getElementById('inputText').value;
            try {
                document.getElementById('outputText').textContent = btoa(unescape(encodeURIComponent(input)));
            } catch(e) { document.getElementById('outputText').textContent = '编码失败：' + e.message; }
        }
        function decode() {
            const input = document.getElementById('inputText').value;
            try {
                document.getElementById('outputText').textContent = decodeURIComponent(escape(atob(input)));
            } catch(e) { document.getElementById('outputText').textContent = '解码失败：请确认输入是有效的 Base64 字符串'; }
        }
        function swapInputOutput() {
            const input = document.getElementById('inputText');
            const output = document.getElementById('outputText');
            input.value = output.textContent;
            output.textContent = '';
        }
        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').textContent = '';
        }
        function copyOutput() {
            const text = document.getElementById('outputText').textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                const tip = document.getElementById('copyTip3');
                tip.style.display = 'inline'; setTimeout(() => { tip.style.display = 'none'; }, 2000);
            });
        }
    </script>
</body>
</html>
