<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线字数统计工具 - 免费字符计数、段落分析 | 实用工具箱</title>
    <meta name="description" content="免费在线字数统计工具，支持统计中英文字数、字符数、段落数、行数，实时计算，无需安装，完全免费。适用于论文写作、文章排版、内容创作。">
    <meta name="keywords" content="字数统计,在线字数统计,字符计数,段落统计,免费工具,文章统计">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://3865c8a4.tools-site-7n4.pages.dev">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5; color: #333; min-height: 100vh;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        header { 
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; padding: 40px 0; text-align: center; margin-bottom: 30px;
        }
        header h1 { font-size: 28px; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 16px; }
        .card {
            background: white; border-radius: 12px; padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: #444; border-left: 4px solid #667eea; padding-left: 12px; }
        textarea {
            width: 100%; min-height: 250px; padding: 16px; font-size: 16px;
            border: 2px solid #e0e0e0; border-radius: 8px; resize: vertical;
            font-family: inherit; line-height: 1.8; transition: border-color 0.3s;
        }
        textarea:focus { outline: none; border-color: #667eea; }
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px; margin-top: 16px;
        }
        .stat-item {
            background: #f8f9ff; border-radius: 8px; padding: 16px; text-align: center;
            transition: transform 0.2s;
        }
        .stat-item:hover { transform: translateY(-2px); }
        .stat-item .number {
            font-size: 28px; font-weight: 700; color: #667eea; display: block;
        }
        .stat-item .label { font-size: 13px; color: #888; margin-top: 4px; }
        .footer-text {
            text-align: center; color: #999; font-size: 13px; padding: 30px 0;
        }
        .btn {
            display: inline-block; border: none; padding: 8px 20px;
            border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 12px;
            color: white; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-clear { background: #ff4757; }
        .btn-copy { background: #2ed573; margin-left: 8px; }
        .btn-upload { background: #667eea; margin-left: 8px; }
        .tool-links {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-top: 16px;
        }
        .tool-links a {
            display: block; padding: 14px; background: #f8f9ff; border-radius: 8px;
            text-decoration: none; color: #667eea; font-weight: 500;
            text-align: center; transition: all 0.2s; border: 1px solid transparent;
        }
        .tool-links a:hover { background: #eef0ff; border-color: #667eea; transform: translateY(-1px); }
        input[type="file"] { display: none; }
        @media (max-width: 600px) {
            header h1 { font-size: 22px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>📝 在线字数统计工具</h1>
            <p>实时统计中英文字数、字符数、段落数，完全免费 · 纯离线运行</p>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h2>✏️ 输入文本</h2>
            <textarea id="textInput" placeholder="在此输入或粘贴要统计的文字..."></textarea>
            <div>
                <button class="btn btn-clear" onclick="clearText()">清空</button>
                <button class="btn btn-copy" onclick="copyText()">复制结果</button>
                <button class="btn btn-upload" onclick="document.getElementById('fileInput').click()">导入文件</button>
                <input type="file" id="fileInput" accept=".txt" onchange="loadFile(event)">
                <span id="copyTip" style="margin-left:10px;font-size:13px;color:#2ed573;display:none;">✅ 已复制</span>
            </div>
        </div>

        <div class="card">
            <h2>📊 统计结果</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <span class="number" id="charCount">0</span>
                    <span class="label">总字符数</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="charNoSpace">0</span>
                    <span class="label">不计空格</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="wordCount">0</span>
                    <span class="label">中文字数</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="engWordCount">0</span>
                    <span class="label">英文单词数</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="lineCount">0</span>
                    <span class="label">行数</span>
                </div>
                <div class="stat-item">
                    <span class="number" id="paraCount">0</span>
                    <span class="label">段落数</span>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🔧 更多实用工具</h2>
            <div class="tool-links">
                <a href="password.html">🔑 随机密码生成器</a>
                <a href="color.html">🎨 颜色转换器</a>
                <a href="base64.html">🔐 Base64 编解码</a>
                <a href="counter.html">⏱ 在线倒计时</a>
            </div>
        </div>

        <div class="footer-text">
            <p>纯在线工具 · 不存储任何内容 · 完全免费 · 2026</p>
        </div>
    </div>

    <script>
        const input = document.getElementById('textInput');
        
        function updateStats() {
            const text = input.value;
            const charCount = text.length;
            const charNoSpace = text.replace(/\s/g, '').length;
            const chineseChars = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
            const engText = text.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g, ' ');
            const engWords = engText.split(/\s+/).filter(w => w.length > 0 && /[a-zA-Z]/.test(w)).length;
            const lines = text.split('\n');
            const lineCount = text.length === 0 ? 0 : lines.length;
            const paras = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
            const paraCount = paras.length;
            document.getElementById('charCount').textContent = charCount;
            document.getElementById('charNoSpace').textContent = charNoSpace;
            document.getElementById('wordCount').textContent = chineseChars;
            document.getElementById('engWordCount').textContent = engWords;
            document.getElementById('lineCount').textContent = lineCount;
            document.getElementById('paraCount').textContent = paraCount;
        }

        function clearText() { input.value = ''; updateStats(); input.focus(); }

        function copyText() {
            const items = document.querySelectorAll('.stat-item');
            let text = '字数统计结果：\n';
            items.forEach(item => {
                const num = item.querySelector('.number').textContent;
                const label = item.querySelector('.label').textContent;
                text += label + ': ' + num + '\n';
            });
            navigator.clipboard.writeText(text).then(() => {
                const tip = document.getElementById('copyTip');
                tip.style.display = 'inline';
                setTimeout(() => { tip.style.display = 'none'; }, 2000);
            });
        }

        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { input.value = e.target.result; updateStats(); };
            reader.readAsText(file);
        }

        input.addEventListener('input', updateStats);
    </script>
</body>
</html>
