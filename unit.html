<div class="card"><div class="form-row"><div class="form-group"><label>类别</label><select id="unitCategory" onchange="updateUnits()"><option value="length">长度</option><option value="weight">重量</option><option value="temperature">温度</option><option value="area">面积</option><option value="volume">体积</option><option value="speed">速度</option><option value="data">数据存储</option></select></div>

<div class="form-row"><div class="form-group"><label>从</label><select id="fromUnit" onchange="convertUnit()"></select></div>
<div class="form-group"><label>到</label><select id="toUnit" onchange="convertUnit()"></select></div></div>
<div id="unitResult" style="background:#f5f7fa;border-radius:8px;padding:16px;text-align:center;margin-top:12px;">
<div style="font-size:14px;" id="unitResultText"></div></div></div>
<div class="card"><h2 style="font-size:16px;margin-bottom:12px;">📊 快速换算表</h2>
<div id="quickTable" style="font-size:13px;color:#4e5969;"></div></div>

<footer><div class="container"><p>本工具所有处理均在您的本地浏览器完成，100%保护您的隐私安全。</p><p>© 免费工具站 · 永久免费 · 无弹窗广告</p></div></footer>
<script src="js/common.js"></script>
<script>
const units={
    length:{base:'米',units:[{n:'千米',r:1000},{n:'米',r:1},{n:'分米',r:0.1},{n:'厘米',r:0.01},{n:'毫米',r:0.001},{n:'微米',r:0.000001},{n:'纳米',r:1e-9},{n:'英里',r:1609.344},{n:'英尺',r:0.3048},{n:'英寸',r:0.0254},{n:'海里',r:1852}]},
    weight:{base:'千克',units:[{n:'吨',r:1000},{n:'千克',r:1},{n:'克',r:0.001},{n:'毫克',r:0.000001},{n:'微克',r:1e-9},{n:'斤',r:0.5},{n:'两',r:0.05},{n:'磅',r:0.453592},{n:'盎司',r:0.0283495}]},
    temperature:{base:'°C',units:[{n:'摄氏度 (°C)',r:1},{n:'华氏度 (°F)',r:2},{n:'开尔文 (K)',r:3}]},
    area:{base:'平方米',units:[{n:'平方千米',r:1e6},{n:'平方米',r:1},{n:'平方分米',r:0.01},{n:'平方厘米',r:0.0001},{n:'平方毫米',r:0.000001},{n:'公顷',r:10000},{n:'亩',r:666.667},{n:'平方英里',r:2589988.11},{n:'平方英尺',r:0.092903}]},
    volume:{base:'升',units:[{n:'立方米',r:1000},{n:'升',r:1},{n:'毫升',r:0.001},{n:'加仑 (美)',r:3.78541},{n:'加仑 (英)',r:4.54609},{n:'立方英尺',r:28.3168},{n:'立方英寸',r:0.0163871}]},
    speed:{base:'米/秒',units:[{n:'米/秒',r:1},{n:'千米/时',r:0.277778},{n:'英里/时',r:0.44704},{n:'节',r:0.514444},{n:'光速',r:299792458}]},
    data:{base:'字节',units:[{n:'字节 (B)',r:1},{n:'千字节 (KB)',r:1024},{n:'兆字节 (MB)',r:1048576},{n:'吉字节 (GB)',r:1073741824},{n:'太字节 (TB)',r:1099511627776},{n:'拍字节 (PB)',r:1125899906842624}]}
};
function updateUnits(){
    const cat=document.getElementById('unitCategory').value;
    const data=units[cat];const sel1=document.getElementById('fromUnit'),sel2=document.getElementById('toUnit');
    sel1.innerHTML='';sel2.innerHTML='';
    data.units.forEach(function(u,i){
        sel1.innerHTML+='<option value="'+i+'">'+u.n+'</option>';
        sel2.innerHTML+='<option value="'+i+'">'+u.n+'</option>';
    });
    if(cat==='temperature'){sel2.value='2';}else if(data.units.length>1){sel2.value='1';}
    convertUnit();
    // 快速换算表
    const tb=document.getElementById('quickTable');
    if(cat==='temperature'){tb.innerHTML='温度换算公式：<br>°F = °C × 9/5 + 32<br>K = °C + 273.15<br>°C = (°F - 32) × 5/9';}
    else{
        let html='1 '+data.units[0].n+' = ';const pieces=[];
        for(let i=1;i<Math.min(data.units.length,8);i++){
            pieces.push((1*data.units[0].r/data.units[i].r).toFixed(data.units[i].r<1?4:0)+' '+data.units[i].n);
        }tb.innerHTML=html+pieces.join('<br>= ');
    }
}
function convertUnit(){
    const cat=document.getElementById('unitCategory').value;
    const val=parseFloat(document.getElementById('unitValue').value)||0;
    const from=parseInt(document.getElementById('fromUnit').value);
    const to=parseInt(document.getElementById('toUnit').value);
    const data=units[cat];let result;
    if(cat==='temperature'){
        const celsius=[function(c){return c;},function(c){return c*9/5+32;},function(c){return c+273.15;}];
        const toCelsius=[function(c){return c;},function(f){return (f-32)*5/9;},function(k){return k-273.15;}];
        const c=toCelsius[from](val);
        result=celsius[to](c);
    }else{result=val*data.units[from].r/data.units[to].r;}
    document.getElementById('unitResultText').innerHTML='<span style="font-size:16px;">'+val+' '+data.units[from].n+' = <strong style="font-size:22px;color:#165DFF;">'+(cat==='temperature'?result.toFixed(2):result.toFixed(6))+'</strong> '+data.units[to].n+'</span>';
}
updateUnits();
</script></body></html>
