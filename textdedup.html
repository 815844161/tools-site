<div class="card"><h2 style="font-size:16px;margin-bottom:12px;">📤 去重结果</h2>
<textarea id="dedupOutput" readonly style="width:100%;min-height:200px;padding:14px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;resize:vertical;font-family:inherit;line-height:1.6;background:#f9f9f9;"></textarea>

<script src="js/common.js"></script>
<script>
function dedup(){processDedup(false);}
function dedupSort(){processDedup(true);}
function processDedup(sort){
    const input=document.getElementById('dedupInput').value;
    const lines=input.split('\n');const seen={};const result=[];
    lines.forEach(function(line){
        if(!seen[line]){seen[line]=true;result.push(line);}
    });
    if(sort)result.sort();
    document.getElementById('dedupOutput').value=result.join('\n');
    document.getElementById('dedupInfo').textContent='原始 '+lines.length+' 行 → 去重后 '+result.length+' 行（去除了 '+(lines.length-result.length)+' 行）';
}
function copyDedup(){copyText(document.getElementById('dedupOutput').value,'dedupCopyTip');}
